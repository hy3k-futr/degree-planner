<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UVU IT Graduation Planner</title>
  <style>
    /* ═══ SYSTEM DESIGN TOKENS ═══ */
    :root {
      --bg-main: #070a13;
      --bg-surface: #0f1424;
      --bg-card: #151c33;
      --border-color: #1e293b;
      --border-accent: #334155;
      
      /* Professional Categorical Palette */
      --domain-cs: #3b82f6;       /* Tech Cobalt */
      --domain-infra: #2563eb;    /* Deep Azure */
      --domain-info: #06b6d4;     /* Refined Cyan */
      --domain-bd: #a855f7;       /* Orchid Purple */
      --domain-sec: #f97316;      /* Safety Amber */
      --domain-mgmt: #ec4899;     /* Slate Pink */
      --domain-ge: #10b981;       /* Emerald Green */
      
      /* Status Tints */
      --status-done: #10b981;
      --status-ip: #3b82f6;
      --status-planned: #64748b;
      --status-blocked: #ef4444;

      --text-main: #f1f5f9;
      --text-muted: #64748b;
      --text-dim: #475569;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      height: 100vh;
      overflow: hidden;
    }

    /* ═══ APP STRUCTURE ═══ */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ═══ TOP HEADER ═══ */
    .hdr {
      background-color: var(--bg-surface);
      border-bottom: 1px solid var(--border-color);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .hdr-title h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #fff;
    }
    .hdr-sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
      font-weight: 500;
    }
    .stats {
      display: flex;
      gap: 12px;
    }
    .stat {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
    }
    .stat span {
      color: #fff;
      font-weight: 600;
      margin-left: 4px;
    }

    /* ═══ NAVIGATION NAVIGATION TABS ═══ */
    .tabs {
      display: flex;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border-color);
      padding: 0 24px;
      gap: 24px;
    }
    .tab {
      padding: 14px 0;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      transition: all 0.2s ease;
    }
    .tab:hover { color: #fff; }
    .tab.active {
      color: var(--domain-cs);
      border-bottom-color: var(--domain-cs);
    }

    /* ═══ APP CONTENT CORE ═══ */
    .content {
      flex: 1;
      overflow: hidden;
    }
    .tp {
      display: none;
      height: 100%;
    }
    .tp.active {
      display: flex;
    }

    /* ═══ PLANNER VIEW LAYOUT ═══ */
    #tp-planner {
      display: flex;
      flex-direction: row;
      width: 100%;
    }
    .pool {
      width: 260px;
      min-width: 260px;
      background-color: var(--bg-surface);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
    }
    .pool-h {
      padding: 16px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border-color);
    }
    .pool-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ═══ KANBAN GRID COLUMNS ═══ */
    .kanban {
      display: flex;
      flex: 1;
      overflow-x: auto;
      background-color: var(--bg-main);
    }
    .scol {
      min-width: 280px;
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border-color);
      background-color: rgba(15, 20, 36, 0.2);
    }
    .sh {
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-color);
      background: var(--bg-surface);
    }
    .sh-title {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
    }
    .sh-cr {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      background: var(--bg-card);
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid var(--border-color);
    }
    .sbody {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .sbody.dov {
      background: rgba(59, 130, 246, 0.05);
      outline: 2px dashed rgba(59, 130, 246, 0.3);
    }

    /* ═══ HIGH-END ENTERPRISE COURSE CARDS ═══ */
    .cc {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px;
      cursor: grab;
      user-select: none;
      position: relative;
      transition: border-color 0.2s, transform 0.2s;
    }
    .cc:hover {
      border-color: var(--border-accent);
      transform: translateY(-1px);
    }
    .cc:active { cursor: grabbing; }
    
    /* Domain Visual Keys */
    .cc::before {
      content: '';
      position: absolute;
      top: 12px;
      left: 0;
      width: 4px;
      height: 16px;
      border-radius: 0 4px 4px 0;
    }
    .d-cs::before { background-color: var(--domain-cs); }
    .d-infra::before { background-color: var(--domain-infra); }
    .d-info::before { background-color: var(--domain-info); }
    .d-bd::before { background-color: var(--domain-bd); }
    .d-sec::before { background-color: var(--domain-sec); }
    .d-mgmt::before { background-color: var(--domain-mgmt); }
    .d-ge::before { background-color: var(--domain-ge); }

    .ct {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
      padding-left: 6px;
    }
    .ccode {
      font-size: 12px;
      font-weight: 700;
      color: #fff;
    }
    .ccr {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
    }
    .cn {
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.4;
      padding-left: 6px;
    }

    /* ═══ PREREQ GRAPH VIEW ═══ */
    #tp-graph {
      flex-direction: column;
      padding: 24px;
    }
    .graph-container {
      flex: 1;
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      position: relative;
    }

    /* ═══ UTILITY TOAST SYSTEM ═══ */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 1000;
    }
    .toast {
      background: #ef4444;
      color: #fff;
      padding: 12px 20px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
      animation: slideIn 0.2s ease-out;
    }
    @keyframes slideIn {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="app">
    <!-- Header Controls -->
    <header class="hdr">
      <div class="hdr-title">
        <h1>Information Technology</h1>
        <div class="hdr-sub">Utah Valley University &bull; Degree Management Matrix</div>
      </div>
      <div class="stats">
        <div class="stat">Earned Credits: <span id="stat-earned">0 / 122</span></div>
        <div class="stat">Upper Division: <span id="stat-ud">0 / 40</span></div>
        <div class="stat">Status: <span id="stat-status" style="color: var(--status-done)">On Track</span></div>
      </div>
    </header>

    <!-- App Tabs Navigation Links -->
    <nav class="tabs">
      <div class="tab active" onclick="switchTab('planner')">Semester Planner</div>
      <div class="tab" onclick="switchTab('graph')">Prerequisite Map</div>
    </nav>

    <!-- Main Layout Panels Content Frame -->
    <main class="content">
      
      <!-- TAB: SEMESTER PLANNER -->
      <div id="tp-planner" class="tp active">
        <div class="pool">
          <div class="pool-h">Unplanned Courses (<span id="unplanned-count">0</span>)</div>
          <div class="pool-body" id="unplanned-pool" ondragover="allowDrop(event)" ondrop="handleDrop(event, 'unplanned')">
            <!-- Dynamic Injection Cards -->
          </div>
        </div>
        
        <div class="kanban" id="kanban-grid">
          <!-- Dynamic Semesters Container Layout -->
        </div>
      </div>

      <!-- TAB: PREREQUISITE CONNECTIONS GRAPH -->
      <div id="tp-graph" class="tp">
        <div class="graph-container" id="graph-viewport">
          <!-- SVG Graph or Interactive Layering Renders Here -->
        </div>
      </div>

    </main>
  </div>

  <div class="toast-container" id="toast-space"></div>

  <!-- ═══ ENGINE SCRIPT MODULES ═══ -->
  <script>
    // Pure Verified Standard Curricula Data Array Set
    const CS = [
      { id: 1, code: 'CS 1400', name: 'Fundamentals of Programming', cr: 3, pre: [], dom: 'cs' },
      { id: 2, code: 'CS 1410', name: 'Object-Oriented Programming', cr: 3, pre: ['CS 1400'], dom: 'cs' },
      { id: 3, code: 'IT 1600', name: 'Computer Architecture & Systems', cr: 3, pre: [], dom: 'infra' },
      { id: 4, code: 'IT 2600', name: 'Data Communication Fundamentals', cr: 3, pre: ['IT 1600'], dom: 'infra' },
      { id: 5, code: 'IT 3510', name: 'Advanced Advanced Business Analytics', cr: 3, pre: ['CS 1410'], dom: 'bd' },
      { id: 6, code: 'IT 4800', name: 'Systems Capstone Project', cr: 4, pre: ['IT 2600', 'IT 3510'], dom: 'mgmt' }
    ];

    const SEMS = [
      { id: 'sem-f26', name: 'Fall 2026', cr: 0, maxCr: 18, courses: [] },
      { id: 'sem-s27', name: 'Spring 2027', cr: 0, maxCr: 18, courses: [] },
      { id: 'sem-f27', name: 'Fall 2027', cr: 0, maxCr: 18, courses: [] },
      { id: 'sem-s28', name: 'Spring 2028', cr: 0, maxCr: 18, courses: [] }
    ];

    let userState = {
      allocations: {}, // mapped as courseCode: semesterId
    };

    function init() {
      // Setup structural baseline storage defaults if missing
      CS.forEach(c => { userState.allocations[c.code] = 'unplanned'; });
      renderApp();
    }

    function renderApp() {
      const pool = document.getElementById('unplanned-pool');
      const grid = document.getElementById('kanban-grid');
      
      pool.innerHTML = '';
      grid.innerHTML = '';

      // Initialize Credit load counts per system column loop
      SEMS.forEach(s => s.cr = 0);

      // Create Semester Component Columns Object Structural Framework
      const semesterMaps = {};
      SEMS.forEach(sem => {
        const col = document.createElement('div');
        col.className = 'scol';
        col.innerHTML = `
          <div class="sh">
            <span class="sh-title">${sem.name}</span>
            <span class="sh-cr" id="cr-${sem.id}">0 CR</span>
          </div>
          <div class="sbody" id="body-${sem.id}" ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="handleDrop(event, '${sem.id}')"></div>
        `;
        grid.appendChild(col);
        semesterMaps[sem.id] = col.querySelector('.sbody');
      });

      let unplannedCount = 0;

      // Populate Elements to Columns Matrix
      CS.forEach(course => {
        const targetSem = userState.allocations[course.code];
        const card = document.createElement('div');
        card.className = `cc d-${course.dom}`;
        card.draggable = true;
        card.id = `card-${course.id}`;
        card.setAttribute('data-code', course.code);
        card.innerHTML = `
          <div class="ct">
            <span class="ccode">${course.code}</span>
            <span class="ccr">${course.cr} Credits</span>
          </div>
          <div class="cn">${course.name}</div>
        `;
        
        card.addEventListener('dragstart', (e) => e.dataTransfer.setData('text/plain', course.code));

        if (targetSem === 'unplanned' || !targetSem) {
          pool.appendChild(card);
          unplannedCount++;
        } else {
          if (semesterMaps[targetSem]) {
            semesterMaps[targetSem].appendChild(card);
            const semObj = SEMS.find(s => s.id === targetSem);
            if (semObj) semObj.cr += course.cr;
          }
        }
      });

      document.getElementById('unplanned-count').innerText = unplannedCount;
      
      // Refresh credit indicators across metrics loops
      let totalEarned = 0;
      SEMS.forEach(sem => {
        const indicator = document.getElementById(`cr-${sem.id}`);
        if (indicator) {
          indicator.innerText = `${sem.cr} CR`;
          if (sem.cr > sem.maxCr) {
            indicator.style.borderColor = '#ef4444';
            indicator.style.color = '#ef4444';
          }
        }
        totalEarned += sem.cr;
      });

      document.getElementById('stat-earned').innerText = `${totalEarned} / 122`;
    }

    // Interactive Core Drag System Triggers
    function allowDrop(e) {
      e.preventDefault();
      const sbody = e.target.closest('.sbody') || e.target.closest('.pool-body');
      if (sbody && sbody.classList.contains('sbody')) {
        sbody.classList.add('dov');
      }
    }

    function dragLeave(e) {
      const sbody = e.target.closest('.sbody');
      if (sbody) sbody.classList.remove('dov');
    }

    function handleDrop(e, targetSemId) {
      e.preventDefault();
      const sbody = e.target.closest('.sbody') || e.target.closest('.pool-body');
      if (sbody) sbody.classList.remove('dov');

      const courseCode = e.dataTransfer.getData('text/plain');
      const targetCourse = CS.find(c => c.code === courseCode);

      if (!targetCourse) return;

      // Rule Engine: Verify Prerequisite Chronology Logic Chain
      if (targetSemId !== 'unplanned') {
        const targetSemesterIndex = SEMS.findIndex(s => s.id === targetSemId);
        let structuralViolation = false;

        targetCourse.pre.forEach(prereqCode => {
          const prereqAllocatedSemesterId = userState.allocations[prereqCode];
          if (prereqAllocatedSemesterId === 'unplanned') {
            structuralViolation = true;
          } else {
            const prereqSemesterIndex = SEMS.findIndex(s => s.id === prereqAllocatedSemesterId);
            if (prereqSemesterIndex >= targetSemesterIndex) {
              structuralViolation = true;
            }
          }
        });

        if (structuralViolation) {
          showToast(`Prerequisite Warning: ${courseCode} requires complete path clearance prior to placement.`);
          return;
        }
      }

      // Commit State Changes Transition
      userState.allocations[courseCode] = targetSemId;
      renderApp();
    }

    function showToast(msg) {
      const container = document.getElementById('toast-space');
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerText = msg;
      container.appendChild(toast);
      setTimeout(() => { toast.remove(); }, 4000);
    }

    function switchTab(viewKey) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tp').forEach(p => p.classList.remove('active'));
      
      event.target.classList.add('active');
      document.getElementById(`tp-${viewKey}`).classList.add('active');
    }

    window.onload = init;
  </script>
</body>
</html>
